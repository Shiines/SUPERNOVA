<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIOR · Option 2 · Orbital</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ob:#0E0E10;--gold:#E8B873;--day:#F6F1EA;--stone:#BFB3A4}
html,body{width:100%;height:100%;background:var(--ob);overflow:hidden}

#scene{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  perspective:700px;
}

#ring-wrap{
  position:relative;
  width:340px;height:340px;
  transform-style:preserve-3d;
  animation:orbit 9s linear infinite;
}

@keyframes orbit{
  from{ transform: rotateX(68deg) rotateZ(0deg); }
  to  { transform: rotateX(68deg) rotateZ(360deg); }
}

#ring-svg{
  position:absolute;inset:0;
  overflow:visible;
}

/* Main ring */
#ring-svg .r1{
  fill:none;
  stroke:var(--gold);
  stroke-opacity:.6;
  stroke-width:1.1;
  stroke-dasharray:942px;    /* full circle ~942 for r=150 */
  stroke-dashoffset:56px;    /* ~6% gap */
}

/* Inner glow ring */
#ring-svg .r2{
  fill:none;
  stroke:var(--gold);
  stroke-opacity:.08;
  stroke-width:8;
}

/* Outer ghost */
#ring-svg .r3{
  fill:none;
  stroke:var(--gold);
  stroke-opacity:.07;
  stroke-width:.5;
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.6rem,5.5vw,4.2rem);
  font-weight:300;letter-spacing:.3em;
  color:var(--day);
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:10;user-select:none;pointer-events:none;
  text-indent:.3em;
}
.logo .o{color:var(--gold)}

.tag{
  position:fixed;bottom:16%;left:50%;
  transform:translateX(-50%);
  font-family:'Inter',sans-serif;
  font-size:.6rem;letter-spacing:.22em;
  color:var(--stone);opacity:.6;
  text-transform:uppercase;user-select:none;
}

.label{
  position:fixed;top:32px;left:50%;
  transform:translateX(-50%);
  font-family:'Inter',sans-serif;
  font-size:.58rem;letter-spacing:.18em;
  color:var(--stone);opacity:.38;
  text-transform:uppercase;
  white-space:nowrap;
}

/* Speed controls */
.controls{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:20px;
}
.ctrl{
  font-family:'Inter',sans-serif;
  font-size:.58rem;letter-spacing:.12em;
  color:var(--stone);opacity:.35;
  text-transform:uppercase;
  cursor:pointer;padding:6px 12px;
  border:1px solid rgba(191,179,164,.15);
  border-radius:20px;
  transition:opacity .2s,border-color .2s;
  background:none;
}
.ctrl:hover,.ctrl.active{opacity:.8;border-color:rgba(232,184,115,.3);color:var(--gold)}
</style>
</head>
<body>

<div class="label">Option 2 · Orbital Ring · Rotation continue</div>

<div id="scene">
  <div id="ring-wrap">
    <svg id="ring-svg" viewBox="0 0 340 340">
      <circle class="r2" cx="170" cy="170" r="150"/>
      <circle class="r1" cx="170" cy="170" r="150"/>
      <circle class="r3" cx="170" cy="170" r="160"/>
    </svg>
  </div>
</div>

<div class="logo">L&nbsp;I&nbsp;<span class="o">O</span>&nbsp;R</div>
<div class="tag">Interior &amp; Space Design Studio</div>

<div class="controls">
  <button class="ctrl" onclick="setSpeed(14)">Slow</button>
  <button class="ctrl active" onclick="setSpeed(9)">Normal</button>
  <button class="ctrl" onclick="setSpeed(4)">Fast</button>
</div>

<script>
const wrap = document.getElementById('ring-wrap');

function setSpeed(s){
  wrap.style.animationDuration = s + 's';
  document.querySelectorAll('.ctrl').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
