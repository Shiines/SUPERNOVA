<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entrance Preview · LIOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ob:#0E0E10;--gold:#E8B873;--day:#F6F1EA;--stone:#BFB3A4}
html,body{width:100%;height:100%;background:var(--ob);overflow:hidden}

#ent{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.ent-logo{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(3.2rem,7vw,5.6rem);
  font-weight:300;
  letter-spacing:.32em;
  color:var(--day);
  text-indent:.32em;
  opacity:0;
  animation:fadeUp 1.4s cubic-bezier(.16,1,.3,1) .2s forwards;
}
.ent-logo .o{color:var(--gold)}

.ent-tag{
  font-family:'Inter',sans-serif;
  font-size:.62rem;
  font-weight:300;
  letter-spacing:.26em;
  color:var(--stone);
  margin-top:.9rem;
  text-indent:.26em;
  opacity:0;
  animation:fadeUp 1.2s cubic-bezier(.16,1,.3,1) .7s forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to  {opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div id="ent">
  <div class="ent-logo">L&nbsp;I&nbsp;<span class="o">O</span>&nbsp;R</div>
  <div class="ent-tag">INTERIOR &amp; SPACE DESIGN STUDIO</div>
</div>
</body>
</html>
